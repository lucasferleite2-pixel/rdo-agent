<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--vst-paper);width:700px;box-sizing:border-box}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--vst-rule-hair)}
.sw{aspect-ratio:1/.9;padding:10px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--vst-rule-hair)}
.sw:last-child{border-right:0}
.sw .n{font-family:var(--vst-mono);font-size:10px;letter-spacing:.05em}
.sw .h{font-family:var(--vst-mono);font-size:9px;opacity:.7}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--vst-fg-3);font-weight:600;margin-bottom:8px}
</style></head><body>
<div class="lbl">Paleta primária</div>
<div class="grid">
  <div class="sw" style="background:#6B0F1A;color:#F5F1EA"><span class="n">bordô</span><span class="h">#6B0F1A</span></div>
  <div class="sw" style="background:#1A1A1A;color:#F5F1EA"><span class="n">ink</span><span class="h">#1A1A1A</span></div>
  <div class="sw" style="background:#4A4A4A;color:#F5F1EA"><span class="n">graphite</span><span class="h">#4A4A4A</span></div>
  <div class="sw" style="background:#F5F1EA;color:#1A1A1A;border-right:1px solid var(--vst-rule-hair)"><span class="n">paper</span><span class="h">#F5F1EA</span></div>
  <div class="sw" style="background:#8B6F47;color:#F5F1EA"><span class="n">gold</span><span class="h">#8B6F47</span></div>
</div>
</body></html>
