<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--vst-paper);width:700px;box-sizing:border-box}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid var(--vst-rule-hair)}
.sw{aspect-ratio:1/.8;padding:10px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--vst-rule-hair)}
.sw:last-child{border-right:0}
.sw .n{font-family:var(--vst-mono);font-size:10px}
.sw .h{font-family:var(--vst-mono);font-size:9px;opacity:.7}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--vst-fg-3);font-weight:600;margin-bottom:8px}
</style></head><body>
<div class="lbl">Neutros — escala de papel & grafite</div>
<div class="grid">
  <div class="sw" style="background:#FBF8F2;color:#1A1A1A"><span class="n">paper-hi</span><span class="h">#FBF8F2</span></div>
  <div class="sw" style="background:#F5F1EA;color:#1A1A1A"><span class="n">paper</span><span class="h">#F5F1EA</span></div>
  <div class="sw" style="background:#EDE7DC;color:#1A1A1A"><span class="n">paper-2</span><span class="h">#EDE7DC</span></div>
  <div class="sw" style="background:#E3DCCE;color:#1A1A1A"><span class="n">paper-3</span><span class="h">#E3DCCE</span></div>
  <div class="sw" style="background:#9A9A9A;color:#F5F1EA"><span class="n">graph-3</span><span class="h">#9A9A9A</span></div>
  <div class="sw" style="background:#6E6E6E;color:#F5F1EA"><span class="n">graph-2</span><span class="h">#6E6E6E</span></div>
</div>
</body></html>
