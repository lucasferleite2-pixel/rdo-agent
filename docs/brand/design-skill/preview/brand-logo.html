<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--vst-paper);width:700px;box-sizing:border-box}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--vst-fg-3);font-weight:600;margin-bottom:14px}
.brand{display:flex;gap:30px;align-items:flex-start;margin-bottom:24px}
.b1{font-family:var(--vst-serif);font-size:48px;font-weight:500;color:#1A1A1A;letter-spacing:-.005em;line-height:1}
.b1 em{color:#6B0F1A;font-style:normal}
.b2{background:#1A1A1A;color:#F5F1EA;padding:12px 18px;font-family:var(--vst-serif);font-size:28px}
.b2 em{color:#8B6F47;font-style:normal}
.mono{display:flex;gap:16px;align-items:center;padding-top:16px;border-top:1px solid rgba(26,26,26,.22)}
.mark{width:64px;height:64px;border:1px solid #1A1A1A;display:flex;align-items:center;justify-content:center;font-family:var(--vst-serif);font-size:40px;font-style:italic;color:#1A1A1A;background:#F5F1EA;position:relative}
.mark::after{content:'';position:absolute;inset:3px;border:.5px solid rgba(26,26,26,.3)}
.mark .dot{position:absolute;bottom:8px;width:3px;height:3px;border-radius:50%;background:#6B0F1A}
.tag{font-family:var(--vst-sans);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#4A4A4A;font-weight:600}
</style></head><body>
<div class="lbl">Logotipo — wordmark & monograma</div>
<div class="brand">
  <div class="b1">Vest<em>í</em>gio</div>
  <div class="b2">Vest<em>í</em>gio</div>
</div>
<div class="mono">
  <div class="mark">V<span class="dot"></span></div>
  <div>
    <div class="tag">PERÍCIA DIGITAL</div>
    <div style="font-family:var(--vst-mono);font-size:11px;color:#9A9A9A;margin-top:4px">favicon · avatar · marca d'água reduzida</div>
  </div>
</div>
</body></html>
