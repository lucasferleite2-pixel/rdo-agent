<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--vst-paper);width:700px;box-sizing:border-box}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--vst-fg-3);font-weight:600;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px}
.shape{width:80px;height:56px;background:var(--vst-paper-hi);border:1px solid var(--vst-rule)}
.name{font-family:var(--vst-mono);font-size:11px;color:var(--vst-fg-2)}
.val{font-family:var(--vst-mono);font-size:10px;color:var(--vst-fg-3)}
</style></head><body>
<div class="lbl">Raios — quase-zero, editorial</div>
<div class="grid">
  <div class="cell"><div class="shape" style="border-radius:0"></div><span class="name">r-0</span><span class="val">0px · cards, superfícies</span></div>
  <div class="cell"><div class="shape" style="border-radius:1px"></div><span class="name">r-1</span><span class="val">2px · inputs</span></div>
  <div class="cell"><div class="shape" style="border-radius:3px"></div><span class="name">r-2</span><span class="val">3px · botões</span></div>
  <div class="cell"><div class="shape" style="border-radius:999px;width:80px;height:22px"></div><span class="name">pill</span><span class="val">tags, status dots</span></div>
</div>
</body></html>
