<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--vst-paper);width:700px;box-sizing:border-box}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--vst-fg-3);font-weight:600;margin-bottom:16px}
.row{display:flex;align-items:center;gap:16px;padding:10px 0;border-bottom:1px solid var(--vst-rule-hair)}
.row:last-child{border-bottom:0}
.bar{background:var(--vst-ink);height:10px}
.name{font-family:var(--vst-mono);font-size:11px;width:52px;color:var(--vst-fg-2)}
.val{font-family:var(--vst-mono);font-size:10px;color:var(--vst-fg-3);width:52px;text-align:right}
</style></head><body>
<div class="lbl">Spacing — 8pt grid</div>
<div class="row"><span class="name">s-1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
<div class="row"><span class="name">s-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
<div class="row"><span class="name">s-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
<div class="row"><span class="name">s-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
<div class="row"><span class="name">s-5</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
<div class="row"><span class="name">s-6</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
<div class="row"><span class="name">s-7</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
<div class="row"><span class="name">s-8</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
</body></html>
