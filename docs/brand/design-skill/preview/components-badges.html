<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--vst-paper);width:700px;box-sizing:border-box}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--vst-fg-3);font-weight:600;margin-bottom:16px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-family:var(--vst-sans);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;padding:3px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%}
.ok{background:rgba(61,90,58,.12);color:#3D5A3A}
.ok .dot{background:#3D5A3A}
.warn{background:rgba(168,117,28,.14);color:#8A5E12}
.warn .dot{background:#A8751C}
.alert{background:rgba(107,15,26,.1);color:#6B0F1A}
.alert .dot{background:#6B0F1A}
.mute{background:rgba(0,0,0,.05);color:#6E6E6E}
.mute .dot{background:#9A9A9A}
.selo{font-family:var(--vst-serif);font-style:italic;font-size:12px;color:#8B6F47;border:1px solid #8B6F47;padding:3px 12px;border-radius:2px;letter-spacing:.04em}
</style></head><body>
<div class="lbl">Badges & selos</div>
<div class="row">
  <span class="tag ok"><span class="dot"></span>Íntegro</span>
  <span class="tag warn"><span class="dot"></span>Data inferida</span>
  <span class="tag alert"><span class="dot"></span>Cadeia quebrada</span>
  <span class="tag mute"><span class="dot"></span>Em processamento</span>
</div>
<div class="row">
  <span class="selo">Laudo auditável</span>
  <span class="selo">Assinatura digital</span>
  <span class="selo">Certificado ICP-Brasil</span>
</div>
</body></html>
