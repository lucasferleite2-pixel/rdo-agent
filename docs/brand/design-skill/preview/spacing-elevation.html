<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--vst-paper);width:700px;box-sizing:border-box}
.lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--vst-fg-3);font-weight:600;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px}
.shape{width:120px;height:72px;background:var(--vst-paper-hi)}
.name{font-family:var(--vst-mono);font-size:11px;color:var(--vst-fg-2)}
.val{font-family:var(--vst-mono);font-size:10px;color:var(--vst-fg-3);text-align:center}
</style></head><body>
<div class="lbl">Elevação & Rules — restrita</div>
<div class="grid">
  <div class="cell"><div class="shape" style="border:1px solid rgba(26,26,26,0.12)"></div><span class="name">shadow-1</span><span class="val">hair rule</span></div>
  <div class="cell"><div class="shape" style="box-shadow:0 1px 2px rgba(26,26,26,0.06),0 0 0 1px rgba(26,26,26,0.12)"></div><span class="name">shadow-2</span><span class="val">card padrão</span></div>
  <div class="cell"><div class="shape" style="box-shadow:0 2px 6px rgba(26,26,26,0.08),0 0 0 1px rgba(26,26,26,0.12)"></div><span class="name">shadow-3</span><span class="val">popover</span></div>
  <div class="cell"><div class="shape" style="box-shadow:0 20px 48px rgba(26,26,26,0.18),0 0 0 1px rgba(26,26,26,0.22)"></div><span class="name">modal</span><span class="val">diálogo</span></div>
</div>
</body></html>
